name: Release Tag on Develop Push

# develop ブランチへの push 時にトリガー
on:
  push:
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release-tag:
    runs-on: ubuntu-latest
    
    steps:
      # リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # package.json からバージョンを抽出
      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      # Git 認証設定
      - name: Setup git credentials
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config credential.helper store
          echo "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com" > ~/.git-credentials

      # Release ブランチが存在しない場合は作成
      - name: Create Release branch if not exists
        run: |
          git fetch origin
          
          if ! git rev-parse --verify origin/release > /dev/null 2>&1; then
            echo "Creating release branch..."
            git checkout -b release
            git push -u origin release
          else
            echo "Release branch already exists"
          fi

      # develop から release へマージ
      - name: Merge develop to release
        run: |
          git fetch origin develop release
          git checkout release
          git merge --no-ff origin/develop -m "Merge develop into release for v${{ steps.version.outputs.version }}"
          git push origin release

      # タグを作成してプッシュ
      - name: Create and push tag
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          
          # タグが既に存在する場合はスキップ
          if git rev-parse --verify "refs/tags/$TAG" > /dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping..."
          else
            echo "Creating tag: $TAG"
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      # GitHub Release を作成
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
